<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMX FLOW | SOC 1.0</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --text-main: #f8fafc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard {
            width: 90%;
            max-width: 1200px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        h1 {
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5rem;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            text-align: left;
            color: #94a3b8;
            padding: 12px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 15px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-critical { color: var(--accent-red); font-weight: bold; }
        .status-info { color: var(--accent-green); }

        .refresh-btn {
            background: transparent;
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .refresh-btn:hover {
            background: var(--accent-green);
            color: white;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>UMX SOC // Live Threat Feed</h1>
            <button class="refresh-btn" onclick="fetchLogs()">REFRESH FEED</button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>TIMESTAMP</th>
                    <th>SOURCE IP</th>
                    <th>SEVERITY</th>
                    <th>LOG MESSAGE</th>
                </tr>
            </thead>
            <tbody id="log-table-body">
                </tbody>
        </table>
    </div>

    <script>
        async function fetchLogs() {
            try {
                const response = await fetch('/api/logs');
                const logs = await response.json();
                const tableBody = document.getElementById('log-table-body');
                
                tableBody.innerHTML = ''; // Clear current table

                logs.reverse().forEach(log => {
                    const row = `
                        <tr>
                            <td>${new Date(log.timestamp).toLocaleString()}</td>
                            <td><code>${log.sourceIp}</code></td>
                            <td class="${log.severity === 'CRITICAL' ? 'status-critical' : 'status-info'}">
                                ${log.severity}
                            </td>
                            <td>${log.message}</td>
                        </tr>
                    `;
                    tableBody.insertAdjacentHTML('beforeend', row);
                });
            } catch (err) {
                console.error("Failed to fetch logs:", err);
            }
        }

        // Auto-refresh every 5 seconds
        setInterval(fetchLogs, 5000);
        fetchLogs();
    </script>
</body>
</html>
